<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Keerthi Store</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">🛒 Keerthi Store</div>

    <input class="search" placeholder="Search products..." onkeyup="searchProduct()">

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="orders.html">Orders</a>
        <a href="cart.html">Cart</a>
        <a href="website.test.html">Tests</a>
        <a class="login-link" href="login.html">Login</a>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <h1>GET START YOUR FAVORITE SHOPPING</h1>
        <button onclick="getProducts()">Shop Now</button>
    </div>
</section>

<!-- ADD PRODUCT -->
<div class="container">
    <div class="add-box">
        <input id="pid_add" placeholder="Product ID">
        <input id="name" placeholder="Product Name">
        <input id="price" placeholder="Price">
        <input id="image" placeholder="Image URL">
        <button onclick="addProduct()">Add Product</button>
    </div>
</div>

<!-- PRODUCTS -->
<div class="container">
    <h2>Products</h2>
    <div id="products" class="products"></div>
</div>

<script src="script.js"></script>

</body>
</html>
