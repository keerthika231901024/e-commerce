<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keerthi Store - Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">

<header class="navbar">
    <div class="logo">🛒 Keerthi Store</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="orders.html">Orders</a>
        <a href="cart.html">Cart</a>
        <a href="website.test.html">Tests</a>
    </div>
</header>

<main class="auth-wrap">
    <section class="auth-card">
        <h1>Login</h1>
        <p>Sign in to your Keerthi Store account</p>

        <div id="loginMessage" class="auth-message"></div>

        <form class="auth-form" onsubmit="return handleLogin(event)">
            <label>
                Email Address
                <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" required>
            </label>

            <label>
                Password
                <input id="loginPassword" type="password" placeholder="Enter your password" autocomplete="current-password" required>
            </label>

            <button type="submit">Login</button>
        </form>

        <div class="auth-hint">
            <p>Don't have an account? <a href="index.html">Contact support</a></p>
        </div>
    </section>
</main>

<script src="js/script.js"></script>

</body>
</html>
